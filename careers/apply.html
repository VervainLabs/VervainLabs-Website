<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Icons (Lucide/Simple Icons style) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- <link rel="stylesheet" href="../style.css"> -->

  <title>Careers | Vervain Labs</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="../assets/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="../assets/favicon.png">

  <!-- SEO -->
  <meta name="description" content="Apply for jobs at Vervain Labs" />
  <meta name="robots" content="index, follow" />
</head>

<body>
  

  <!-- Background -->
  <!-- <div class="bg-blur"></div> -->
   <canvas id="bg-canvas"></canvas>

  <nav>
    <div class="logo">
      <img src="../assets/logo_symbol.png" alt="Vervain Logo">
      <span>vervain</span>
    </div>
    
    <div class="nav-actions">
      <div class="social-links">
        <a href="https://github.com/VervainLabs" target="_blank" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
        <a href="https://linkedin.com/company/vervain-labs" target="_blank" aria-label="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
        <a href="https://x.com/VervainLabs" target="_blank" aria-label="Twitter/X"><i class="fa-brands fa-twitter"></i>
          <!-- <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z"/></svg> -->
        </a>
        <a href="https://discord.gg/B3cPuWsu3u" target="_blank" aria-label="Discord"><i class="fa-brands fa-discord"></i></a>
      </div>
    </div>
  </nav>

  <!-- Main Form -->
  <main class="main-container">
    <div class="form-card">

      <h2>Career Application Form</h2>
      <p class="subtitle">
        Join our team and build something impactful.
      </p>

      <form id="applicationForm">

        <!-- Name -->
        <div class="row">
          <div class="input-group">
            <label>First Name</label>
            <input type="text" name="firstName" required />
          </div>

          <div class="input-group">
            <label>Last Name</label>
            <input type="text" name="lastName" required />
          </div>
        </div>

        <!-- Gender -->
        <div class="input-group">
          <label>Gender</label>

          <div class="radio-group">
            <label>
              <input type="radio" name="gender" value="Male" required />
              Male
            </label>

            <label>
              <input type="radio" name="gender" value="Female" required />
              Female
            </label>
          </div>
        </div>

        <!-- Contact -->
        <div class="row">
          <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" required />
          </div>

          <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" name="phone" required />
          </div>
        </div>

        <!-- Links -->
        <div class="input-group">
          <label>LinkedIn Profile</label>
          <input type="url" name="linkedin" placeholder="https://linkedin.com/in/username" required />
        </div>

        <div class="input-group">
          <label>GitHub Profile</label>
          <input type="url" name="github" placeholder="https://github.com/username" required />
        </div>

        <div class="input-group">
          <label>Resume Link</label>
          <input type="url" name="resume" placeholder="Google Drive / Dropbox / Portfolio Link" required />
        </div>

        <!-- Position -->
        <div class="input-group">
          <label>Position Applying For</label>

          <select id="position" name="position" required>
            <option value="">Select Position</option>
            <option>Frontend Developer</option>
            <option>Backend Developer</option>
            <option>Full Stack Developer</option>
            <option>UI/UX Designer</option>
            <option>Marketing Executive</option>
            <option>HR</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <!-- Other Position -->
        <div class="input-group hidden" id="otherPositionGroup">
          <label>Other Position</label>
          <input type="text" id="otherPosition" name="otherPosition" />
        </div>

        <!-- Experience -->
        <div class="input-group">
          <label>Years of Experience (optional unless mentioned in job description)</label>
          <input type="number" name="experience" min="0" max="50" />
        </div>

        <!-- Portfolio -->
        <div class="input-group">
          <label>Portfolio Website</label>
          <input type="url" name="portfolio" placeholder="https://yourportfolio.com" />
        </div>

        <!-- Additional Message -->
        <div class="input-group">
          <label>Additional Message</label>
          <textarea
            name="message"
            rows="5"
            placeholder="Tell us about yourself..."
          ></textarea>
        </div>

        <!-- Submit -->
        <button type="submit" id="submitBtn">
          Submit Application
        </button>

        <!-- Status -->
        <p id="statusMessage"></p>

      </form>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer glass">
    <div class="footer-content">

      <p>
        © 2026 Vervain Labs —
        <a href="https://vervain-labs.vercel.app/" target="_blank">
          Visit Our Website
        </a>
      </p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
